name: Lint Skills

on:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'academic/**'
      - 'design/**'
      - 'engineering/**'
      - 'finance/**'
      - 'game-development/**'
      - 'marketing/**'
      - 'paid-media/**'
      - 'product/**'
      - 'project-management/**'
      - 'sales/**'
      - 'spatial-computing/**'
      - 'specialized/**'
      - 'strategy/**'
      - 'support/**'
      - 'testing/**'
      - 'scripts/lint-skills.ps1'
      - 'scripts/audit-agent-refs.ps1'
      - 'scripts/external-skill-refs.txt'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'skills/**'
      - 'academic/**'
      - 'design/**'
      - 'engineering/**'
      - 'finance/**'
      - 'game-development/**'
      - 'marketing/**'
      - 'paid-media/**'
      - 'product/**'
      - 'project-management/**'
      - 'sales/**'
      - 'spatial-computing/**'
      - 'specialized/**'
      - 'strategy/**'
      - 'support/**'
      - 'testing/**'
      - 'scripts/lint-skills.ps1'
      - 'scripts/audit-agent-refs.ps1'
      - 'scripts/external-skill-refs.txt'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint-skills.ps1 (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pwsh version
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize

      - name: Run lint-skills.ps1 -Strict
        shell: pwsh
        run: ./scripts/lint-skills.ps1 -Strict

  audit-refs:
    name: audit-agent-refs.ps1 (cross-reference)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run audit-agent-refs.ps1
        shell: pwsh
        run: ./scripts/audit-agent-refs.ps1
