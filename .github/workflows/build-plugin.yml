name: Build Plugin

on:
  push:
    branches: [master]
    paths:
      - 'academic/**'
      - 'design/**'
      - 'engineering/**'
      - 'finance/**'
      - 'game-development/**'
      - 'marketing/**'
      - 'paid-media/**'
      - 'product/**'
      - 'project-management/**'
      - 'sales/**'
      - 'spatial-computing/**'
      - 'specialized/**'
      - 'strategy/**'
      - 'support/**'
      - 'testing/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/build-plugin.ps1'
      - '.github/workflows/build-plugin.yml'
  pull_request:
    paths:
      - 'academic/**'
      - 'design/**'
      - 'engineering/**'
      - 'finance/**'
      - 'game-development/**'
      - 'marketing/**'
      - 'paid-media/**'
      - 'product/**'
      - 'project-management/**'
      - 'sales/**'
      - 'spatial-computing/**'
      - 'specialized/**'
      - 'support/**'
      - 'testing/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/build-plugin.ps1'
      - '.github/workflows/build-plugin.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-plugin.ps1
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pwsh version
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize

      - name: Build plugin into dist/plugin
        shell: pwsh
        run: ./scripts/build-plugin.ps1

      - name: Assert structure
        shell: pwsh
        run: |
          $d = 'dist/plugin'
          $agentCount = (Get-ChildItem "$d/agents" -File -Filter '*.md').Count
          $skillCount = (Get-ChildItem "$d/skills" -Directory | Where-Object { Test-Path "$($_.FullName)/SKILL.md" }).Count
          $hooksOk    = Test-Path "$d/hooks/hooks.json"
          $manifestOk = Test-Path "$d/.claude-plugin/plugin.json"

          Write-Host "Agents:       $agentCount (expected 163)"
          Write-Host "Skills:       $skillCount (expected 24)"
          Write-Host "hooks.json:   $hooksOk"
          Write-Host "manifest:     $manifestOk"

          if ($agentCount -ne 163) { throw "Expected 163 agents, got $agentCount" }
          if ($skillCount -ne 24)  { throw "Expected 24 skills, got $skillCount" }
          if (-not $hooksOk)       { throw "hooks/hooks.json missing" }
          if (-not $manifestOk)    { throw ".claude-plugin/plugin.json missing" }

      - name: Validate JSON manifests parse
        shell: pwsh
        run: |
          Get-Content dist/plugin/.claude-plugin/plugin.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content dist/plugin/hooks/hooks.json -Raw | ConvertFrom-Json | Out-Null
          Write-Host "[OK] Both manifests parse"

      - name: Test -Divisions parameter (scoped build)
        shell: pwsh
        run: |
          ./scripts/build-plugin.ps1 -Divisions finance,engineering -OutDir dist/plugin-scoped
          $count = (Get-ChildItem 'dist/plugin-scoped/agents' -File -Filter '*.md').Count
          $manifest = Get-Content 'dist/plugin-scoped/.claude-plugin/plugin.json' -Raw | ConvertFrom-Json
          Write-Host "Scoped agents: $count (expected 32)"
          Write-Host "Scoped manifest name: $($manifest.name)"
          if ($count -ne 32) { throw "Expected 32 scoped agents, got $count" }
          if ($manifest.name -ne 'agency-agents-fork-engineering-finance') {
            throw "Expected scoped name 'agency-agents-fork-engineering-finance', got '$($manifest.name)'"
          }

      - name: Test -Divisions rejects invalid input
        shell: pwsh
        run: |
          $err = $null
          try {
            ./scripts/build-plugin.ps1 -Divisions bogus -OutDir dist/plugin-bogus 2>&1 | Out-Null
            throw "Build should have failed for bogus division"
          } catch {
            $err = $_.Exception.Message
            if ($err -notmatch 'Unknown division') {
              throw "Expected 'Unknown division' error, got: $err"
            }
            Write-Host "[OK] Bogus division correctly rejected: $err"
          }

      - name: Upload plugin artifact (full)
        uses: actions/upload-artifact@v4
        with:
          name: agency-agents-fork-plugin
          path: dist/plugin
          retention-days: 30

      - name: Upload plugin artifact (scoped sample)
        uses: actions/upload-artifact@v4
        with:
          name: agency-agents-fork-plugin-scoped-sample
          path: dist/plugin-scoped
          retention-days: 7
