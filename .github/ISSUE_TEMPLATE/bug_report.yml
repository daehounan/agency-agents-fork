name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Concise description of the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `git clone https://github.com/daehounan/agency-agents-fork`
        2. `.\scripts\install.ps1 -WithSkills`
        3. ...
    validations:
      required: true
  - type: input
    id: ps-version
    attributes:
      label: PowerShell version
      description: "Output of `$PSVersionTable.PSVersion`"
      placeholder: e.g. 7.4.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 23H2 / Ubuntu 24.04 / macOS 15.2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
